<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>X02 Bot - Streaming Demo</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    .chunk { color: #333; }
    .tool { color: #0066ff; font-style: italic; }
    input, button { padding: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🚀 X02 Chatbot Streaming Demo</h1>
  <input type="text" id="question" placeholder="Nhập câu hỏi..." style="width:70%">
  <button onclick="sendMessage()">Gửi</button>

  <div id="chat"></div>

  <script>
    async function sendMessage() {
      const q = document.getElementById('question').value;
      if (!q) return;

      const chat = document.getElementById('chat');
      chat.innerHTML += `<p><b>Bạn:</b> ${q}</p>`;
      document.getElementById('question').value = '';

      const response = await fetch('http://127.0.0.1:8000/chat_x02/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: q,
          session_id: "test123",
          userId: "test",
          headers: { authorization: "Bearer your_token_here" }  // thay bằng token thật nếu cần
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const text = decoder.decode(value);
        const lines = text.split('\n\n');

        for (let line of lines) {
          if (line.startsWith('data: ')) {
            const data = JSON.parse(line.slice(6));

            if (data.type === 'chunk') {
              chat.innerHTML += `<span class="chunk">${data.content}</span>`;
              chat.scrollTop = chat.scrollHeight;
            }
            else if (data.type === 'tool_start') {
              chat.innerHTML += `<p class="tool">🔧 Đang dùng tool: ${data.tool}...</p>`;
            }
            else if (data.type === 'done') {
              chat.innerHTML += `<p><b>Bot đã trả lời xong!</b></p><hr>`;
            }
          }
        }
      }
    }
  </script>
</body>
</html>
